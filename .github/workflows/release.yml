name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*' # Triggers the pipeline when pushing a version tag like v1.5.0

permissions:
  contents: write # Required permission to build, upload, and attach binary objects to release drafts

jobs:
  compile-binaries:
    name: Cross Compile Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Windows Target Matrices
          - goos: windows
            goarch: amd64
            artifact_name: ig-downloader-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: ig-downloader-windows-arm64.exe
            
          # macOS Target Matrices
          - goos: darwin
            goarch: amd64
            artifact_name: ig-downloader-mac-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: ig-downloader-mac-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go Runtime
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3' 

      - name: Compile Standalone Static Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # Enforce pure static zero-dependency compilation
        run: |
          # Added optimizations flags (-s -w) to shrink the final binaries file size
          go build -ldflags="-s -w" -o build/${{ matrix.artifact_name }} ./src

      # Temporarily store the compiled file as an unreleased action artifact
      - name: Stash Artifact Temp Link
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.artifact_name }}
          retinuation-token: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Assets to Release
    needs: compile-binaries # Forces this block to wait until all parallel compilation jobs finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download all 4 binaries back from the temporary action storage folder space
      - name: Download Stashed Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true # Flattens files directly into a single folder level

      # Single thread release execution prevents server race condition collisions
      - name: Create Single Unified Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}